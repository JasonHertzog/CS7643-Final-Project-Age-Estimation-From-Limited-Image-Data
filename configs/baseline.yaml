experiment_name: "linear_model_training"
model_name: "linear"  # linear, mlp, or mlp_dropout
seed: 42
pretrained: True

# Data parameters
batch_size: 32
num_workers: 4
image_size: 224

# Training parameters
epochs: 5
learning_rate: 0.001
optimizer: "Adam"
loss_function: "MSELoss"
save_best: True

# MLP + Dropout
dropout: 0.2
