# Config file for ResNet18 pretrained on ImageNet, used as a fully finetuned model for linear regression. 

experiment_name: "mlp_bn_regression_pretrained_fully_finetuned"
model_name: "mlp_bn"  # linear, mlp, or mlp_dropout
seed: 42
pretrained: True
freeze_backbone: False    # Whether to fine-tune the pretrained model or just use it as a feature extractor
task: "regression"  # regression or classification
metric: "mae"       # mse for regression, accuracy for classification

# Data parameters
batch_size: 64
num_workers: 4
image_size: 224

# Training parameters
epochs: 30
learning_rate: 0.0001
optimizer: "Adam"
loss_function: "MAELoss" 
save_best: True
weight_decay: 0.01

# MLP + Dropout
dropout: 0.1
